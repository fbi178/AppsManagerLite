name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid xz 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build + Pack
      run: |
        export THEOS=/tmp/theos
        cd App
        make package 2>&1
        cd Packages
        DEB=$(ls *.deb | head -1)
        cd ..
        echo "Deb: $DEB"
        ar -x "Packages/$DEB" data.tar.lzma
        mkdir -p Payload
        tar -xf data.tar.lzma
        echo "=== Deb files ==="
        find Applications -type f
        mv Applications/bobomanagerlite.app Payload/
        echo "=== App contents ==="
        ls -la Payload/bobomanagerlite.app/
        zip -r Payload.zip Payload
        mv Payload.zip Packages/app.tipa
        ls -la Packages/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/app.tipa
