name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y git curl build-essential fakeroot libz-dev

    - name: 安装 Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: 下载 iOS SDK
      run: |
        export THEOS=$HOME/theos
        mkdir -p $THEOS/sdks
        cd $THEOS/sdks
        # 从 theos sdks 官方源下载
        curl -L --retry 3 https://github.com/arturgryshyn/apple-sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz ||         curl -L --retry 3 https://github.com/theos/sdks/raw/master/iPhoneOS16.0.sdk.tar.xz -o sdk.tar.xz
        tar -xf sdk.tar.xz 2>/dev/null || true
        ls -la *.sdk 2>/dev/null && echo "SDK ready" || echo "SDK dir: $(ls)"

    - name: 编译
      run: |
        export THEOS=$HOME/theos
        cd App
        make package

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/*.tipa
