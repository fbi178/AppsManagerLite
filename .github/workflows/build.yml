name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with: { path: App }

    - name: Setup
      run: |
        sudo apt update -qq
        sudo apt install -y -qq git curl build-essential fakeroot libz-dev
        git clone --recursive --depth 1 -q https://github.com/theos/theos.git /tmp/theos
        git clone --depth 1 -q https://github.com/xybp888/iOS-SDKs.git /tmp/sdk
        mkdir -p /tmp/theos/sdks
        cp -a /tmp/sdk/iPhoneOS14.5.sdk /tmp/theos/sdks/

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make package 2>&1

    - name: Upload
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: tipa
        path: App/Packages/*.tipa
