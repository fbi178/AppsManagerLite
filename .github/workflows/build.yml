name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with: { path: App }

    - name: Install deps
      run: sudo apt update && sudo apt install -y git curl build-essential fakeroot libz-dev

    - name: Theos
      run: git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: SDK
      run: |
        git clone --depth 1 https://github.com/xybp888/iOS-SDKs.git /tmp/sdk
        mkdir -p /tmp/theos/sdks
        cp -a /tmp/sdk/iPhoneOS14.5.sdk /tmp/theos/sdks/

    - name: Build
      run: |
        set -x
        which make
        export THEOS=/tmp/theos
        ls -la /tmp/theos/
        ls /tmp/theos/sdks/
        cd App
        ls -la
        pwd
        make package 2>&1

    - name: Upload
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: tipa
        path: App/Packages/*.tipa
