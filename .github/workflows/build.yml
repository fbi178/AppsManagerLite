name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup + Build
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos
        export THEOS=/tmp/theos
        cd App
        make 2>&1

    - name: Python Pack
      run: |
        python3 -c "
import zipfile, os, shutil

# Find the .app
for root, dirs, files in os.walk('App/.theos'):
    for d in dirs:
        if d.endswith('.app') and 'arm64' not in root:
            src = os.path.join(root, d)
            print(f'Using: {src}')
            print('Contents:')
            for f in os.listdir(src):
                s = os.path.getsize(os.path.join(src, f))
                print(f'  {f}: {s} bytes')
            
            # Copy to Payload
            dst = 'Payload/' + d
            shutil.rmtree('Payload', ignore_errors=True)
            os.makedirs('Payload', exist_ok=True)
            shutil.copytree(src, dst)
            
            # Create ZIP
            with zipfile.ZipFile('app.tipa', 'w', zipfile.ZIP_DEFLATED) as z:
                for pr, dr, fr in os.walk('Payload'):
                    for fn in fr:
                        fp = os.path.join(pr, fn)
                        an = fp  # relative path includes Payload/
                        z.write(fp, an)
            
            print(f'TIPA: {os.path.getsize(\"app.tipa\")} bytes')
            break
    else:
        print('No .app found!')
        " 2>&1

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: app.tipa
