name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build + Sign + Pack
      run: |
        export THEOS=/tmp/theos
        cd App
        make 2>&1
        
        # Take the staged app
        SRC=$(find .theos/_ -name "*.app" -type d | head -1)
        echo "SRC: $SRC"
        
        # Check if binary is signed
        echo "=== ldid check ==="
        ldid -e "$SRC/bobomanagerlite" 2>&1 | head -5
        
        # Create Payload
        mkdir -p Payload
        cp -a "$SRC" Payload/
        
        # Verify required files
        APP=Payload/bobomanagerlite.app
        echo "=== App files ==="
        for f in Info.plist PkgInfo bobomanagerlite; do
          [ -f "$APP/$f" ] && echo "✅ $f" || echo "❌ $f MISSING"
        done
        
        ditto -c -k --keepParent Payload app.tipa
        ls -la app.tipa

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: app.tipa
