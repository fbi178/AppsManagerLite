name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid xz 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build + Pack TIPA
      run: |
        export THEOS=/tmp/theos
        cd App
        make package 2>&1
        # Extract .deb
        DEB=\$(ls Packages/*.deb | head -1)
        ar -x "\$DEB" data.tar.lzma
        mkdir -p Payload
        tar -xf data.tar.lzma
        # Check what we have
        echo "=== Deb contents ==="
        find Applications -type f
        echo "=== .app size ==="
        du -sh Applications/bobomanagerlite.app
        # Create Payload
        mv Applications/bobomanagerlite.app Payload/
        # Ensure Info.plist is present
        ls -la Payload/bobomanagerlite.app/
        # Resign for TrollStore
        ldid -S Payload/bobomanagerlite.app/bobomanagerlite 2>/dev/null || echo "ldid skipped"
        # Create TIPA
        zip -r app.tipa Payload
        mv app.tipa Packages/
        ls -la Packages/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/app.tipa
