name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl build-essential fakeroot libz-dev
    - name: Setup Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
        cd $THEOS/sdks
        curl -L --retry 3 https://github.com/theos/sdks/releases/download/iPhoneOS14.5.sdk/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
        tar -xf sdk.tar.xz
    - name: Build
      run: |
        export THEOS=$HOME/theos
        cd App
        make package 2>&1
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/*.tipa
