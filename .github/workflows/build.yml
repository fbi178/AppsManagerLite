name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make 2>&1

    - name: Repack
      run: |
        SRC=App/.theos/obj/debug/bobomanagerlite.app
        DST=Payload/bobomanagerlite.app
        mkdir -p "$DST"
        cp "$SRC/bobomanagerlite" "$DST/"
        cp "$SRC/Info.plist" "$DST/"
        cp "$SRC/LaunchScreen.storyboard" "$DST/" 2>/dev/null || true
        cp "$SRC/PkgInfo" "$DST/" 2>/dev/null || echo -n "APPL????" > "$DST/PkgInfo"
        cp App/Resources/AppIcon60x60@2x.png "$DST/" 2>/dev/null || true
        echo "=== Final .app ==="
        ls -la "$DST"
        echo "=== Entitlements ==="
        ldid -e "$DST/bobomanagerlite" | head -5
        echo "=== Packaging ==="
        zip -X -r app.tipa Payload
        ls -la *.tipa

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: app.tipa
