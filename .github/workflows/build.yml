name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make 2>&1

    - name: Check + List
      run: |
        echo "=== Staged app ==="
        find App/.theos -name "*.app" -type d
        APP=$(find App/.theos -name "*.app" -type d | head -1)
        echo "=== App contents ==="
        ls -laR "$APP"
        echo "=== Binary info ==="
        file "$APP"/bobomanagerlite 2>/dev/null || true
        echo "=== Entitlements ==="
        ldid -e "$APP"/bobomanagerlite 2>/dev/null || echo "no entitlements"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/.theos/_/**/*.app/**/*
