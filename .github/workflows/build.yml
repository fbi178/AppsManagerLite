name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App
    - run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos
    - run: |
        export THEOS=/tmp/theos
        cd App
        make 2>&1
    - run: |
        APP=App/.theos/obj/debug/bobomanagerlite.app
        mkdir -p Payload/bobomanagerlite.app
        cp -a $APP/* Payload/bobomanagerlite.app/
        echo -n "APPL????" > Payload/bobomanagerlite.app/PkgInfo
        cp App/Info.plist Payload/bobomanagerlite.app/
        python3 -c "import zipfile,os; z=zipfile.ZipFile('app.tipa','w',zipfile.ZIP_DEFLATED); [z.write(os.path.join(r,f),os.path.join(r,f)) for r,d,fs in os.walk('Payload') for f in fs]; z.close()"
        python3 -c "import zipfile,plistlib; z=zipfile.ZipFile('app.tipa','r'); ns=z.namelist(); print(sorted(ns)); i=plistlib.loads(z.read('Payload/bobomanagerlite.app/Info.plist')); print('CFBundleExecutable:',i.get('CFBundleExecutable')); print('Binary exists:',('Payload/bobomanagerlite.app/'+str(i.get('CFBundleExecutable'))) in ns)"
    - uses: actions/upload-artifact@v4
      with:
        name: app
        path: app.tipa
