name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with: {path: App}
    - run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos
    - run: |
        export THEOS=/tmp/theos
        cd App
        make 2>&1
    - run: |
        APP=App/.theos/obj/debug/bobomanagerlite.app
        mkdir -p Payload/bobomanagerlite.app
        cp -a $APP/* Payload/bobomanagerlite.app/
        echo -n "APPL????" > Payload/bobomanagerlite.app/PkgInfo
        python3 -c "
import zipfile,os
with zipfile.ZipFile('app.tipa','w',zipfile.ZIP_DEFLATED) as z:
    for r,d,f in os.walk('Payload'):
        for fn in f:
            fp=os.path.join(r,fn)
            z.write(fp,fp)
# Verify
with zipfile.ZipFile('app.tipa','r') as z:
    names=z.namelist()
    for n in sorted(names):
        print(n)
    import plistlib
    try:
        info=plistlib.loads(z.read('Payload/bobomanagerlite.app/Info.plist'))
        exe=info.get('CFBundleExecutable','MISSING')
        print(f'CFBundleExecutable: {exe}')
        print(f'Binary exists: {\"Payload/bobomanagerlite.app/\"+str(exe) in names}')
    except Exception as e:
        print(f'Error: {e}')
"
    - uses: actions/upload-artifact@v4
      with: {name: 啵啵-ManagerLite, path: app.tipa}
