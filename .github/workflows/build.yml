name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup + Build
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos
        export THEOS=/tmp/theos
        cd App
        make 2>&1

    - name: Package TIPA
      run: |
        APP=$(find App/.theos -name "*.app" -type d -not -path "*/arm64/*" | head -1)
        echo "Using: $APP"
        echo -n "APPL????" > "$APP/PkgInfo"
        ls -la "$APP"
        mkdir -p Payload
        cp -a "$APP" Payload/
        zip -X -r app.tipa Payload
        ls -la *.tipa

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: app.tipa
