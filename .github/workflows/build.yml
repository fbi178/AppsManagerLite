name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl build-essential fakeroot libz-dev

    - name: Theos
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: SDK
      run: |
        git clone --depth 1 https://github.com/xybp888/iOS-SDKs.git /tmp/sdkrepo
        cp -a /tmp/sdkrepo/iPhoneOS14.5.sdk /tmp/theos/sdks/iPhoneOS14.5.sdk

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make package 2>&1

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/*.tipa
