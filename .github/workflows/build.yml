name: Build 啵啵-ManagerLite

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        path: App

    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y git curl build-essential fakeroot libz-dev

    - name: 安装 Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS

    - name: 下载 iOS SDK
      run: |
        export THEOS=$HOME/theos
        mkdir -p $THEOS/sdks
        curl -L https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS14.5.sdk.tar.xz -o /tmp/sdk.tar.xz
        tar -xf /tmp/sdk.tar.xz -C $THEOS/sdks

    - name: 编译
      run: |
        export THEOS=$HOME/theos
        cd App
        make package
        echo "编译完成"

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/*.tipa
