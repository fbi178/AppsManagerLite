name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build IPA
      run: |
        export THEOS=/tmp/theos
        cd App
        make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless 2>&1 || true
        # Find the IPA
        find . -name "*.ipa" -o -name "*.deb" | head -5
        ls -la Packages/ 2>/dev/null || ls -la

    - name: Convert to TIPA
      run: |
        # If deb was created, extract app and repack as tipa
        DEB=$(find App -name "*.deb" | head -1)
        if [ -n "$DEB" ]; then
          mkdir -p Payload
          cd App
          ar -x Packages/*.deb data.tar.lzma 2>/dev/null
          tar -xf data.tar.lzma 2>/dev/null
          mv Applications/*.app ../Payload/ 2>/dev/null
          cd ..
          ditto -c -k --keepParent Payload app.tipa
          ls -la app.tipa
        else
          echo "No deb found"
          find . -name "*.app" -type d
        fi

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: app.tipa
