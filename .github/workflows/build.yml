name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make package 2>&1

    - name: Check size
      run: |
        echo "=== Packages ==="
        ls -la App/Packages/
        echo "=== Deb contents ==="
        ar -t App/Packages/*.deb
        ar -x App/Packages/*.deb data.tar.xz
        tar -tf data.tar.xz | head -30
        echo "=== App binary size ==="
        du -sh .theos/_/*.app/bobomanagerlite 2>/dev/null || du -sh App/.theos/_/*.app/* 2>/dev/null || echo "not found"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/*.deb
