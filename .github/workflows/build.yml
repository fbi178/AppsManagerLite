name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make 2>&1

    - name: Pack TIPA
      run: |
        APP=App/.theos/obj/debug/bobomanagerlite.app
        mkdir -p Payload/bobomanagerlite.app
        cp -a "$APP/"* Payload/bobomanagerlite.app/
        echo -n "APPL????" > Payload/bobomanagerlite.app/PkgInfo
        python3 << 'PYEOF'
import zipfile, os
with zipfile.ZipFile('app.tipa', 'w', zipfile.ZIP_DEFLATED) as z:
    for root, dirs, files in os.walk('Payload'):
        for fn in files:
            fp = os.path.join(root, fn)
            z.write(fp, fp)
import os; print(f'TIPA: {os.path.getsize("app.tipa")} bytes')
PYEOF

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: app.tipa
