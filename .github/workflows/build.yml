name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y git curl build-essential fakeroot libz-dev

    - name: Theos + SDK
      run: |
        cd /tmp
        git clone --depth 1 https://github.com/theos/theos.git theos
        cd theos
        git clone --depth 1 https://github.com/theos/sdks.git sdks
        ls sdks/*.sdk/ || echo "No SDK dirs"
        cd /tmp/theos/sdks
        curl -L -o sdk.tar.xz https://github.com/akemin-dayo/AppDataStats/releases/download/sdks/iPhoneOS14.5.sdk.tar.xz
        tar -xf sdk.tar.xz 2>/dev/null
        ls -d *.sdk 2>/dev/null && echo "SDK Ready" || echo "No SDK"

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make package 2>&1

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/*.tipa
