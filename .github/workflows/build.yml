name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App

    - name: Setup
      run: |
        brew install ldid 2>/dev/null || true
        git clone --recursive --depth 1 https://github.com/theos/theos.git /tmp/theos

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make 2>&1

    - name: Pack TIPA
      run: |
        SRC=App/.theos/obj/debug/bobomanagerlite.app
        DST=Payload/bobomanagerlite.app
        mkdir -p "$DST"
        cp "$SRC/bobomanagerlite" "$DST/"
        cp "$SRC/Info.plist" "$DST/"
        cp "$SRC/LaunchScreen.storyboard" "$DST/" 2>/dev/null || true
        echo -n "APPL????" > "$DST/PkgInfo"
        cp App/Resources/AppIcon60x60@2x.png "$DST/" 2>/dev/null || true
        
        echo "=== Verify binary ==="
        file "$DST/bobomanagerlite"
        ldid -e "$DST/bobomanagerlite" | head -3
        ls -la "$DST"
        
        # Use ditto instead of zip (no __MACOSX metadata)
        ditto -c -k --keepParent Payload app.tipa
        ls -la app.tipa

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: app.tipa
