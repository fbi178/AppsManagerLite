name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with: { path: App }

    - name: Install deps
      run: sudo apt update -qq && sudo apt install -y -qq git curl build-essential fakeroot libz-dev

    - name: Theos
      run: git clone --recursive --depth 1 -q https://github.com/theos/theos.git /tmp/theos

    - name: SDK
      run: |
        git clone --depth 1 -q https://github.com/xybp888/iOS-SDKs.git /tmp/sdk
        cp -a /tmp/sdk/iPhoneOS14.5.sdk /tmp/theos/sdks/

    - name: Build
      run: |
        export THEOS=/tmp/theos
        cd App
        make package 2>&1 | tee /tmp/make_output.txt
        exit ${PIPESTATUS[0]}

    - name: Upload logs (even on failure)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          /tmp/make_output.txt
          App/Packages/*.tipa

    - name: Upload tipa
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: tipa
        path: App/Packages/*.tipa
