name: Build 啵啵-ManagerLite
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        path: App
    - name: 安装依赖
      run: |
        sudo apt update
        sudo apt install -y git curl build-essential fakeroot libz-dev
    - name: 安装 Theos
      run: |
        export THEOS=$HOME/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        mkdir -p $THEOS/sdks
    - name: 下载 iOS SDK
      run: |
        export THEOS=$HOME/theos
        cd $THEOS/sdks
        curl -L https://github.com/autopear/apple-sdks/releases/download/14.5/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
        tar -xf sdk.tar.xz
        rm sdk.tar.xz
    - name: 编译
      run: |
        export THEOS=$HOME/theos
        cd App
        make package
    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: 啵啵-ManagerLite
        path: App/Packages/*.tipa
